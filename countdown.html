<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>
    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2S4N123Q9E"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2S4N123Q9E');
    </script>
    <link rel="stylesheet" href="countdown.css">
</head>
<body>
    <div class="container">
        <!-- Main Countdown -->
        <div class="main-countdown">
            <div class="main-header">
                <h1 id="main-title">ACL ARR</h1>
                <div class="main-date" id="main-date"></div>
            </div>
            <div class="main-timer" id="main-timer"></div>
        </div>

        <!-- Secondary Countdowns -->
        <div class="secondary-countdowns" id="secondary-countdowns"></div>
    </div>

    <!-- Noot Noot -->
    <img src="noot-noot-meme-transparent.gif?v=3" alt="" class="noot-noot" id="noot-noot-gif" draggable="false">
    <audio id="noot-noot-sound" preload="auto">
        <source src="noot-noot.mp3" type="audio/mpeg">
    </audio>

    <!-- Load configuration -->
    <script src="countdown-config.js?v=3"></script>
    
    <script>

        // Config times are written in a fixed timezone (AoE = UTC-12 by default).
        // Parsing them WITH that offset gives one absolute instant, identical for
        // every visitor; display then renders it in the viewer's local timezone.
        const CONFIG_TZ = (typeof config !== 'undefined' && config.timezone) || '-12:00';

        function getEventDate(event) {
            return new Date(`${event.date}T${event.time}${CONFIG_TZ}`);
        }

        function getLocalTimeZoneLabel(date) {
            try {
                const parts = new Intl.DateTimeFormat('en-US', { timeZoneName: 'short' })
                    .formatToParts(date);
                const name = parts.find(p => p.type === 'timeZoneName');
                if (name && name.value) return name.value;
            } catch (e) { /* fall through */ }
            // Fallback: build "UTC+9" style label from the raw offset
            const offsetMin = -date.getTimezoneOffset();
            const sign = offsetMin < 0 ? '-' : '+';
            const abs = Math.abs(offsetMin);
            const h = Math.floor(abs / 60);
            const m = abs % 60;
            return `UTC${sign}${h}${m ? ':' + formatNumber(m) : ''}`;
        }

        function calculateTimeLeft(targetDate) {
            const now = new Date().getTime();
            const target = targetDate instanceof Date ? targetDate.getTime() : new Date(targetDate).getTime();
            const difference = target - now;

            if (difference <= 0) {
                return null;
            }

            return {
                days: Math.floor(difference / (1000 * 60 * 60 * 24)),
                hours: Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                minutes: Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60)),
                seconds: Math.floor((difference % (1000 * 60)) / 1000)
            };
        }

        function formatNumber(num) {
            return num.toString().padStart(2, '0');
        }

        function formatDate(date, singleLine = false, est = false) {
            // `date` is the absolute event instant; render it in the viewer's local time
            const year = date.getFullYear();
            const month = formatNumber(date.getMonth() + 1);
            const day = formatNumber(date.getDate());
            const hour = formatNumber(date.getHours());
            const minute = formatNumber(date.getMinutes());
            const estSuffix = est ? ' (est)' : '';
            if (singleLine) {
                return `${year}/${month}/${day}${estSuffix}`;
            }
            return `<div class="date-line1">${year}/<span class="date-highlight">${month}/${day}</span>${estSuffix}</div><div class="date-line2">${hour}:${minute} ${getLocalTimeZoneLabel(date)}</div>`;
        }

        function getVisibleEvents() {
            const upcoming = config.events.filter(e => {
                return calculateTimeLeft(getEventDate(e)) !== null;
            });
            return {
                primary: upcoming[0] || null,
                secondaries: upcoming.slice(1, 5)
            };
        }

        function updateMainCountdown(primary) {
            const timerElement = document.getElementById('main-timer');
            const titleElement = document.getElementById('main-title');
            const dateElement = document.getElementById('main-date');

            if (!primary) {
                titleElement.textContent = 'All Done!';
                dateElement.innerHTML = '';
                timerElement.innerHTML = '<div class="expired">No upcoming events</div>';
                return;
            }

            const targetDate = getEventDate(primary);
            const timeLeft = calculateTimeLeft(targetDate);

            titleElement.textContent = primary.name;
            dateElement.innerHTML = formatDate(targetDate, false, primary.est);

            if (!timeLeft) {
                timerElement.innerHTML = '<div class="expired">Event has passed!</div>';
                return;
            }

            timerElement.innerHTML = `
                <div class="main-time-unit">
                    <div class="main-time-value">${formatNumber(timeLeft.days)}</div>
                    <div class="main-time-label">DAYS</div>
                </div>
                <div class="colon">:</div>
                <div class="main-time-unit">
                    <div class="main-time-value">${formatNumber(timeLeft.hours)}</div>
                    <div class="main-time-label">HOURS</div>
                </div>
                <div class="colon">:</div>
                <div class="main-time-unit">
                    <div class="main-time-value">${formatNumber(timeLeft.minutes)}</div>
                    <div class="main-time-label">MINUTES</div>
                </div>
                <div class="colon">:</div>
                <div class="main-time-unit">
                    <div class="main-time-value main-seconds">${formatNumber(timeLeft.seconds)}</div>
                    <div class="main-time-label">SECONDS</div>
                </div>
            `;
        }

        function updateSecondaryCountdowns(secondaries) {
            const container = document.getElementById('secondary-countdowns');
            container.innerHTML = '';

            secondaries.forEach((countdown) => {
                const targetDate = getEventDate(countdown);
                const timeLeft = calculateTimeLeft(targetDate);

                const card = document.createElement('div');
                card.className = 'countdown-card';
                card.innerHTML = `
                    <div class="card-header">
                        <h2>${countdown.name}</h2>
                        <div class="card-date">${formatDate(targetDate, true, countdown.est)}</div>
                    </div>
                `;

                if (!timeLeft) {
                    card.innerHTML += '<div class="expired">Passed!</div>';
                } else {
                    card.innerHTML += `
                        <div class="countdown-timer">
                            <div class="time-unit">
                                <div class="time-value">${formatNumber(timeLeft.days)}</div>
                                <div class="time-label">DAYS</div>
                            </div>
                            <div class="colon-small">:</div>
                            <div class="time-unit">
                                <div class="time-value">${formatNumber(timeLeft.hours)}</div>
                                <div class="time-label">HRS</div>
                            </div>
                            <div class="colon-small">:</div>
                            <div class="time-unit">
                                <div class="time-value">${formatNumber(timeLeft.minutes)}</div>
                                <div class="time-label">MIN</div>
                            </div>
                            <div class="colon-small">:</div>
                            <div class="time-unit">
                                <div class="time-value small-seconds">${formatNumber(timeLeft.seconds)}</div>
                                <div class="time-label">SEC</div>
                            </div>
                        </div>
                    `;
                }

                container.appendChild(card);
            });
        }

        function updateAllCountdowns() {
            const { primary, secondaries } = getVisibleEvents();
            updateMainCountdown(primary);
            updateSecondaryCountdowns(secondaries);
        }

        // Initial update
        updateAllCountdowns();

        // Update every second
        setInterval(updateAllCountdowns, 1000);

        // Make Pingu animate on click with sound
        const nootNootGif = document.getElementById('noot-noot-gif');
        const nootNootSound = document.getElementById('noot-noot-sound');
        let isAnimating = false;

        if (nootNootGif && nootNootSound) {
            console.log('Pingu initialized!'); // Debug log
            
            const handleNootNoot = (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                console.log('Pingu clicked!', isAnimating); // Debug log
                
                // Prevent re-clicking while animating
                if (isAnimating) return;
                
                isAnimating = true;
                gtag('event', 'pingu_click');
                nootNootGif.style.pointerEvents = 'none';
                nootNootGif.style.cursor = 'default';
                
                // Reload GIF without clearing (prevents glitch)
                const src = nootNootGif.src;
                const baseSrc = src.split('?')[0];
                nootNootGif.src = baseSrc + '?t=' + new Date().getTime();
                
                // Play sound after delay
                setTimeout(() => {
                    nootNootSound.currentTime = 0;
                    nootNootSound.play()
                        .then(() => console.log('Sound played!'))
                        .catch(e => console.log('Audio play failed:', e));
                }, 800);
                
                // Re-enable clicking after animation completes
                setTimeout(() => {
                    isAnimating = false;
                    nootNootGif.style.pointerEvents = 'auto';
                    nootNootGif.style.cursor = 'pointer';
                    console.log('Ready for next click!'); // Debug log
                }, 2500);
            };
            
            nootNootGif.addEventListener('click', handleNootNoot);
            nootNootGif.addEventListener('touchstart', handleNootNoot); // Mobile support
        } else {
            console.error('Pingu or sound not found!'); // Debug log
        }
    </script>
</body>
</html>
